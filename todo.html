<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#764ba2">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="待办事项">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png">
<title>待办事项</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 20px 40px;
    padding-top: calc(60px + env(safe-area-inset-top));
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  .app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 4px 12px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    animation: slideUp 0.4s ease-out;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 28px 28px 24px;
    color: #fff;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
  }
  .header p {
    text-align: center;
    margin-top: 6px;
    font-size: 13px;
    opacity: .75;
  }

  /* 输入区域 */
  .input-area {
    display: flex;
    gap: 10px;
    padding: 20px 24px;
    border-bottom: 1px solid #eee;
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e8e8e8;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color .25s;
  }
  .input-area input:focus {
    border-color: #764ba2;
  }
  .input-area input::placeholder { color: #bbb; }

  .btn {
    padding: 12px 22px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-add {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }
  .btn-add:hover { opacity: .9; transform: translateY(-1px); }
  .btn-add:active { transform: scale(.96); }

  /* 筛选标签 */
  .filters {
    display: flex;
    gap: 4px;
    padding: 12px 24px;
    border-bottom: 1px solid #eee;
  }
  .filter-btn {
    padding: 7px 18px;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: #888;
    font-weight: 500;
    transition: all .2s;
  }
  .filter-btn:hover { color: #555; background: #f5f5f5; }
  .filter-btn.active {
    background: #764ba2;
    color: #fff;
  }

  /* 列表 */
  .todo-list {
    list-style: none;
    max-height: 420px;
    overflow-y: auto;
  }
  .todo-list:empty::after {
    content: '';
    display: block;
    padding: 60px 0;
    text-align: center;
    color: #ccc;
    font-size: 15px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #ccc;
  }
  .empty-state .icon { font-size: 52px; margin-bottom: 12px; }
  .empty-state .text  { font-size: 15px; }

  /* 待办项 */
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid #f3f3f3;
    transition: background .2s;
    animation: fadeIn .3s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(.9); }
  }
  .todo-item.removing {
    animation: fadeOut .25s ease-out forwards;
  }
  .todo-item:hover { background: #fafafa; }

  .todo-item .checkbox {
    appearance: none;
    width: 22px; height: 22px;
    border: 2px solid #d0d0d0;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
    transition: all .25s;
  }
  .todo-item .checkbox:checked {
    background: #764ba2;
    border-color: #764ba2;
  }
  .todo-item .checkbox:checked::after {
    content: '';
    position: absolute;
    left: 6px; top: 2px;
    width: 6px; height: 11px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .todo-item .text {
    flex: 1;
    font-size: 15px;
    color: #333;
    word-break: break-all;
    transition: color .25s;
  }
  .todo-item.completed .text {
    text-decoration: line-through;
    color: #bbb;
  }

  .todo-item .time {
    font-size: 11px;
    color: #ccc;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .todo-item .btn-delete {
    background: none;
    border: none;
    color: #ddd;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    border-radius: 6px;
    transition: all .2s;
    flex-shrink: 0;
    visibility: hidden;
  }
  .todo-item:hover .btn-delete { visibility: visible; }
  .todo-item .btn-delete:hover {
    color: #e74c3c;
    background: #fef0ef;
  }

  /* 编辑模式 */
  .todo-item .edit-input {
    flex: 1;
    padding: 8px 10px;
    font-size: 15px;
    border: 2px solid #764ba2;
    border-radius: 8px;
    outline: none;
  }

  /* 底部栏 */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-top: 1px solid #eee;
    font-size: 13px;
    color: #999;
  }
  .footer .count { font-weight: 600; color: #764ba2; }
  .btn-clear {
    background: none;
    border: none;
    color: #999;
    font-size: 13px;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all .2s;
  }
  .btn-clear:hover { color: #e74c3c; background: #fef0ef; }

  /* 响应式 */
  @media (max-width: 500px) {
    body {
      padding: 20px 10px 30px;
      padding-top: calc(20px + env(safe-area-inset-top));
      padding-bottom: calc(30px + env(safe-area-inset-bottom));
    }
    .header { padding: 22px 18px 20px; }
    .input-area, .filters, .todo-item, .footer { padding-left: 14px; padding-right: 14px; }
    .todo-item .btn-delete { visibility: visible; }
    .todo-list { max-height: calc(100vh - 380px); }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>📝 待办事项</h1>
    <p>记录每一天，完成每一件</p>
  </div>

  <div class="input-area">
    <input type="text" id="todoInput" placeholder="添加新的待办事项…" maxlength="200" autofocus>
    <button class="btn btn-add" id="btnAdd">添加</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="active">未完成</button>
    <button class="filter-btn" data-filter="completed">已完成</button>
  </div>

  <ul class="todo-list" id="todoList"></ul>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">📋</div>
    <div class="text">暂无待办事项</div>
  </div>

  <div class="footer">
    <span>剩余 <span class="count" id="count">0</span> 项</span>
    <button class="btn-clear" id="btnClear">清除已完成</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'my-todo-list';
  const todoInput   = document.getElementById('todoInput');
  const btnAdd      = document.getElementById('btnAdd');
  const todoList    = document.getElementById('todoList');
  const emptyState  = document.getElementById('emptyState');
  const countEl     = document.getElementById('count');
  const btnClear    = document.getElementById('btnClear');
  const filterBtns  = document.querySelectorAll('.filter-btn');

  let todos   = loadTodos();
  let filter  = 'all';

  /* ====== 数据持久化 ====== */
  function loadTodos() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch (e) { return []; }
  }
  function saveTodos() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }

  /* ====== 生成 ID ====== */
  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

  /* ====== 格式化时间 ====== */
  function fmtTime(iso) {
    const d = new Date(iso);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  /* ====== 渲染 ====== */
  function render() {
    const filtered = filter === 'all'
      ? todos
      : filter === 'active'
        ? todos.filter(t => !t.completed)
        : todos.filter(t => t.completed);

    todoList.innerHTML = '';
    filtered.forEach(t => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (t.completed ? ' completed' : '');
      li.dataset.id = t.id;

      li.innerHTML = `
        <input type="checkbox" class="checkbox" ${t.completed ? 'checked' : ''}>
        <span class="text">${escapeHtml(t.text)}</span>
        <span class="time">${fmtTime(t.createdAt)}</span>
        <button class="btn-delete" title="删除">×</button>
      `;

      // 复选框：切换完成
      li.querySelector('.checkbox').addEventListener('change', function () {
        toggleTodo(t.id);
      });

      // 双击编辑
      li.querySelector('.text').addEventListener('dblclick', function () {
        enterEdit(li, t);
      });

      // 删除
      li.querySelector('.btn-delete').addEventListener('click', function () {
        deleteTodo(t.id, li);
      });

      todoList.appendChild(li);
    });

    // 空状态 / 计数
    const showEmpty = filtered.length === 0;
    emptyState.style.display = showEmpty ? 'block' : 'none';
    todoList.style.display = showEmpty ? 'none' : '';

    const activeCount = todos.filter(t => !t.completed).length;
    countEl.textContent = activeCount;
    btnClear.style.visibility = todos.filter(t => t.completed).length > 0 ? '' : 'hidden';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ====== 添加 ====== */
  function addTodo() {
    const text = todoInput.value.trim();
    if (!text) { todoInput.focus(); return; }
    todos.unshift({
      id: genId(),
      text,
      completed: false,
      createdAt: new Date().toISOString()
    });
    todoInput.value = '';
    todoInput.focus();
    saveTodos();
    render();
  }

  /* ====== 切换 ====== */
  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    todo.completed = !todo.completed;
    saveTodos();
    render();
  }

  /* ====== 编辑 ====== */
  function enterEdit(li, todo) {
    const span = li.querySelector('.text');
    const text = span.textContent;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input';
    input.value = text;
    span.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      const newText = input.value.trim();
      if (newText && newText !== text) {
        todo.text = newText;
        saveTodos();
      }
      render();
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { commit(); }
      if (e.key === 'Escape') { render(); }
    });
  }

  /* ====== 删除 ====== */
  function deleteTodo(id, li) {
    li.classList.add('removing');
    li.addEventListener('animationend', function () {
      todos = todos.filter(t => t.id !== id);
      saveTodos();
      render();
    }, { once: true });
  }

  /* ====== 清除已完成 ====== */
  function clearCompleted() {
    todos = todos.filter(t => !t.completed);
    saveTodos();
    render();
  }

  /* ====== 事件绑定 ====== */
  btnAdd.addEventListener('click', addTodo);
  todoInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') addTodo();
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', function () {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  btnClear.addEventListener('click', clearCompleted);

  /* ====== PWA 注册 ====== */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .then(function (reg) { console.log('[PWA] Service Worker 已注册', reg.scope); })
      .catch(function (err) { console.warn('[PWA] Service Worker 注册失败', err); });
  }

  /* ====== 初始渲染 ====== */
  render();
})();
</script>

</body>
</html>
